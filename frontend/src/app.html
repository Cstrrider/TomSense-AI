<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- interactive-widget=resizes-content: when the on-screen keyboard opens,
       shrink the layout viewport instead of letting the page scroll — keeps
       the top bar pinned and the composer just above the keyboard. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TomSense" />

  <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="%sveltekit.assets%/icons/icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
  <!-- crossorigin=use-credentials is REQUIRED so Chrome on Android fetches
       the manifest (and the icons it references) with the CF Access cookie.
       Without it, the manifest fetch 302s to cloudflareaccess.com, Chrome
       fails to parse it, and PWA install criteria silently fail. -->
  <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" crossorigin="use-credentials" />

  <title>TomSense</title>
  %sveltekit.head%
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/service-worker.js')
          .then((reg) => {
            console.info('[sw] registered', reg.scope);
          })
          .catch((err) => {
            console.warn('[sw] registration failed:', err);
          });
      });
    }
  </script>
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
