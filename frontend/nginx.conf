server {
  listen 80;
  server_name _;

  # SSE: don't buffer/cache streaming responses
  proxy_buffering off;
  proxy_cache off;
  proxy_http_version 1.1;
  proxy_set_header Connection "";

  # Re-resolve the backend per request via Docker's embedded DNS. nginx
  # otherwise resolves upstream hostnames ONCE at startup and caches the IP
  # forever — a backend recreate reshuffles container IPs and nginx keeps
  # proxying to the stale one (2026-07-07: tomsense-sandbox inherited the old
  # backend IP and 404'd every API call until this container was restarted).
  # Using a variable in proxy_pass forces runtime resolution via `resolver`.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend http://tomsense-backend:8000;

  root /usr/share/nginx/html;
  index index.html;

  # PWA: don't let the SW be cached — must always revalidate
  location = /service-worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
  # PWA: correct MIME type for the manifest. types{} empty clears inherited
  # map for THIS location only; default_type then sets the response type.
  location = /manifest.webmanifest {
    types { }
    default_type application/manifest+json;
    add_header Cache-Control "no-cache";
    expires off;
  }
  # Long cache for icons
  location /icons/ {
    add_header Cache-Control "public, max-age=2592000";
  }

  # Backend API endpoints — reverse-proxy to tomsense-backend container
  location /chat/ {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location /chats {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location /uploads {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # File uploads can be large; raise the body limit.
    client_max_body_size 50m;
    proxy_request_buffering off;
  }
  location /transcribe {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    client_max_body_size 25m;
    proxy_request_buffering off;
    proxy_read_timeout 90s;
  }
  location /tts {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 90s;
  }
  location /share/ {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location /me {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Forward CF Access headers (nginx preserves them by default, but be explicit)
    proxy_set_header Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
    proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
  }
  location /generated/ {
    proxy_pass $backend;
  }
  # File manager: cross-chat artifacts and sandbox proxy endpoints.
  location /artifacts/ {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location /sandbox/ {
    proxy_pass $backend;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Sandbox writes can carry larger bodies (entire file contents).
    client_max_body_size 10m;
  }
  location = /tools     { proxy_pass $backend; }
  location = /healthz   { proxy_pass $backend; }
  # (exact-match location: with a variable proxy_pass the original URI
  # /info is passed through unchanged, same as the old explicit /info)
  location = /info      { proxy_pass $backend; }

  # Content-hashed bundles (SvelteKit /_app/immutable/...) — the filename
  # changes whenever the content does, so cache them hard. This is what makes
  # the no-cache HTML shell cheap: only the tiny index.html is refetched.
  location /_app/immutable/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback — SvelteKit's adapter-static fallback is /index.html.
  # CRITICAL: the entry HTML must NOT be cached, or the WebView/Cloudflare keeps
  # loading the OLD bundle hashes and never picks up a new deploy. This is what
  # made the native Android app (Capacitor server.url mode → loads the live
  # site) keep rendering a stale frontend even after "clear cache". no-cache
  # forces a revalidation every load, so deploys ship immediately.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate";
  }
}
