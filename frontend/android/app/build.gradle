apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

// Release signing — resolved from (first match wins):
//   1. env vars: TOMSENSE_KEYSTORE_FILE + TOMSENSE_KEYSTORE_PASSWORD
//      (+ optional TOMSENSE_KEY_ALIAS / TOMSENSE_KEY_PASSWORD) — used by CI
//   2. <repo>/signing/keystore.properties next to the .jks — local release
//      builds (the signing/ dir is gitignored)
// Neither present → assembleRelease produces an UNSIGNED apk.
def signingProps = null
def envKeystore = System.getenv("TOMSENSE_KEYSTORE_FILE")
if (envKeystore != null) {
    signingProps = [
        storeFile:     file(envKeystore),
        storePassword: System.getenv("TOMSENSE_KEYSTORE_PASSWORD"),
        keyAlias:      System.getenv("TOMSENSE_KEY_ALIAS") ?: "tomsense",
        keyPassword:   System.getenv("TOMSENSE_KEY_PASSWORD")
                           ?: System.getenv("TOMSENSE_KEYSTORE_PASSWORD"),
    ]
} else {
    // android/ is two levels below the repo root; signing/ sits at the root.
    def propsFile = rootProject.file("../../signing/keystore.properties")
    if (propsFile.exists()) {
        def p = new Properties()
        propsFile.withInputStream { p.load(it) }
        signingProps = [
            storeFile:     new File(propsFile.parentFile, p.getProperty("storeFile")),
            storePassword: p.getProperty("storePassword"),
            keyAlias:      p.getProperty("keyAlias", "tomsense"),
            keyPassword:   p.getProperty("keyPassword", p.getProperty("storePassword")),
        ]
    }
}

android {
    namespace "com.tomsense.app"
    compileSdk rootProject.ext.compileSdkVersion
    kotlinOptions {
        jvmTarget = '21'
    }
    defaultConfig {
        applicationId "com.tomsense.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    if (signingProps != null) {
        signingConfigs {
            release {
                storeFile signingProps.storeFile
                storePassword signingProps.storePassword
                keyAlias signingProps.keyAlias
                keyPassword signingProps.keyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (signingProps != null) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    // Health Connect — backs the get_health client tool (HealthPlugin.kt).
    implementation "androidx.health.connect:connect-client:1.1.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
